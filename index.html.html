<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Long Châu · Performance Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --blue:#1A5FA8;--blue-dk:#0f3d70;--sky:#4BAEE8;--blue-lt:#EBF3FC;
  --orange:#E87722;--orange-lt:#FFF3EB;
  --green:#2E9E5A;--green-lt:#E8F7EE;
  --red:#EF4444;--red-lt:#FEE2E2;
  --yellow:#F59E0B;--yellow-lt:#FFF8E1;
  --w:#fff;--g50:#F8FAFC;--g100:#EEF2F7;--g200:#E2E8F0;
  --g300:#CBD5E1;--g400:#94A3B8;--g500:#64748B;--g700:#334155;--g900:#0F172A;
  --r:12px;--r-sm:8px;--r-lg:16px;
  --sh-sm:0 1px 4px rgba(15,23,42,.06);
  --sh:0 2px 10px rgba(15,23,42,.08);
  --sh-md:0 4px 20px rgba(26,95,168,.1);
}
html,body{height:100%;font-family:"Be Vietnam Pro",sans-serif;background:var(--g50);color:var(--g900);font-size:14px}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--g200);border-radius:3px}
input,select,textarea,button{font-family:inherit}
/* MODE BAR */
#mode-bar{position:fixed;top:0;left:0;right:0;z-index:3000;height:46px;
  background:linear-gradient(90deg,var(--blue-dk),var(--blue) 50%,#1e6fbc);
  display:flex;align-items:center;justify-content:space-between;padding:0 18px;
  box-shadow:0 2px 16px rgba(15,23,42,.25)}
.mb-brand{display:flex;align-items:center;gap:10px}
.mb-logo{width:30px;height:30px;background:rgba(255,255,255,.15);border-radius:9px;
  display:flex;align-items:center;justify-content:center;border:1px solid rgba(255,255,255,.2)}
.mb-name{font-size:13px;font-weight:800;color:#fff}
.mb-sub{font-size:9px;font-weight:700;color:var(--orange);letter-spacing:1px;text-transform:uppercase}
.mb-modes{display:flex;gap:3px;background:rgba(0,0,0,.2);border-radius:8px;padding:3px}
.mb-mode{padding:5px 14px;border-radius:6px;border:none;cursor:pointer;font-size:12px;
  font-weight:700;font-family:inherit;transition:all .15s}
.mb-mode.on{background:#fff;color:var(--blue)}
.mb-mode:not(.on){background:transparent;color:rgba(255,255,255,.6)}
.mb-mode:not(.on):hover{color:#fff}
.mb-right{display:flex;align-items:center;gap:6px}
.mb-btn{display:inline-flex;align-items:center;gap:5px;padding:5px 12px;border-radius:7px;
  border:none;cursor:pointer;font-size:11px;font-weight:700;font-family:inherit;
  transition:all .15s;white-space:nowrap}
.mb-ghost{background:rgba(255,255,255,.12);color:#fff;border:1px solid rgba(255,255,255,.18)}
.mb-ghost:hover{background:rgba(255,255,255,.22)}
.mb-lock{background:rgba(255,255,255,.1);color:rgba(255,255,255,.7);border:1px solid rgba(255,255,255,.15)}
.mb-lock:hover{background:rgba(255,255,255,.2);color:#fff}
.mb-orange{background:rgba(232,119,34,.8);color:#fff;border:1px solid rgba(232,119,34,.3)}
.mb-orange:hover{background:var(--orange)}
.mb-green{background:rgba(46,158,90,.75);color:#fff;border:1px solid rgba(46,158,90,.3)}
.mb-green:hover{background:var(--green)}
.save-ind{font-size:11px;font-weight:600;color:rgba(255,255,255,.5);
  display:flex;align-items:center;gap:4px;padding:0 4px}
.save-ind.ok{color:#86efac}.save-ind.err{color:#fca5a5}.save-ind.sync{color:#fde68a}
/* LAYOUT */
#app{display:flex;padding-top:46px;height:100vh;overflow:hidden}
/* SIDEBAR */
#sidebar{width:208px;min-width:208px;background:var(--w);border-right:1px solid var(--g100);
  display:flex;flex-direction:column;box-shadow:2px 0 12px rgba(26,95,168,.04)}
.nav-wrap{padding:10px 8px;flex:1;overflow-y:auto}
.nav-item{width:100%;display:flex;align-items:center;gap:9px;padding:9px 11px;
  border-radius:var(--r-sm);border:none;cursor:pointer;font-size:12.5px;font-weight:600;
  text-align:left;background:transparent;color:var(--g500);transition:all .12s;
  margin-bottom:1px;font-family:inherit;position:relative}
.nav-item:hover{background:var(--g50);color:var(--g700)}
.nav-item.active{background:var(--blue-lt);color:var(--blue)}
.nav-item.active::before{content:"";position:absolute;left:-8px;top:50%;transform:translateY(-50%);
  width:3px;height:60%;background:var(--blue);border-radius:0 3px 3px 0}
.nav-badge{margin-left:auto;font-size:10px;background:var(--red);color:#fff;
  border-radius:99px;padding:1px 6px;font-weight:800}
.sidebar-foot{padding:14px;border-top:1px solid var(--g100)}
.user-name{font-size:13px;font-weight:700;color:var(--g700)}
.user-role{font-size:11px;color:var(--g400);margin-top:1px}
/* MAIN */
#main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
#topbar{background:var(--w);border-bottom:1px solid var(--g100);padding:0 22px;height:52px;
  display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
#topbar h1{font-size:16px;font-weight:800;color:var(--g900);letter-spacing:-.2px}
#content{flex:1;overflow-y:auto;overflow-x:hidden;padding:20px 22px}
.add-btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;
  border-radius:var(--r-sm);border:none;cursor:pointer;
  background:linear-gradient(135deg,var(--blue),var(--sky));color:#fff;
  font-size:13px;font-weight:700;font-family:inherit;
  box-shadow:0 4px 14px rgba(26,95,168,.3);transition:all .15s}
.add-btn:hover{transform:translateY(-1px);box-shadow:0 6px 18px rgba(26,95,168,.4)}
/* SYNC BANNER */
.sync-banner{border-radius:var(--r);padding:14px 18px;margin-bottom:18px;
  display:flex;align-items:center;gap:14px;flex-wrap:wrap}
.sync-banner.blue{background:linear-gradient(135deg,var(--blue),var(--sky));box-shadow:var(--sh-md)}
.sync-banner.orange{background:linear-gradient(135deg,var(--orange),#f59e42);
  box-shadow:0 4px 16px rgba(232,119,34,.2)}
.sb-text{flex:1;min-width:150px}
.sb-title{font-size:14px;font-weight:800;color:#fff;margin-bottom:2px}
.sb-sub{font-size:12px;color:rgba(255,255,255,.82)}
.sb-btn{padding:9px 18px;border-radius:var(--r-sm);border:2px solid rgba(255,255,255,.55);
  background:rgba(255,255,255,.15);color:#fff;font-size:13px;font-weight:800;
  cursor:pointer;font-family:inherit;white-space:nowrap;transition:all .15s;flex-shrink:0}
.sb-btn:hover{background:rgba(255,255,255,.28)}
.sb-btn:disabled{opacity:.55;cursor:default}
/* STAT CARDS */
.stat-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(145px,1fr));gap:12px;margin-bottom:20px}
.stat-card{background:var(--w);border-radius:var(--r);padding:16px;border:1px solid var(--g100);
  box-shadow:var(--sh-sm);position:relative;overflow:hidden}
.stat-val{font-size:28px;font-weight:900;line-height:1;letter-spacing:-.5px}
.stat-lbl{font-size:11px;color:var(--g500);font-weight:500;margin-top:5px}
.stat-icon{position:absolute;top:14px;right:14px;padding:8px;border-radius:9px;
  width:36px;height:36px;display:flex;align-items:center;justify-content:center}
/* AI */
.ai-panel{background:linear-gradient(135deg,rgba(26,95,168,.05),rgba(75,174,232,.04));
  border:1.5px solid rgba(75,174,232,.2);border-radius:var(--r);padding:16px 18px;margin-bottom:20px}
.ai-head{display:flex;justify-content:space-between;align-items:center}
.ai-title{font-size:13px;font-weight:800;color:var(--blue);display:flex;align-items:center;gap:7px}
.ai-body{font-size:13px;color:var(--g700);line-height:1.8;white-space:pre-wrap;margin-top:12px}
.ai-btn{padding:6px 14px;border-radius:7px;border:none;
  background:linear-gradient(135deg,var(--blue),var(--sky));color:#fff;
  font-weight:700;cursor:pointer;font-size:12px;font-family:inherit}
.ai-btn:disabled{background:var(--g300);cursor:default}
/* PANEL */
.panel{background:var(--w);border-radius:var(--r);border:1px solid var(--g100);overflow:hidden;box-shadow:var(--sh-sm)}
.panel-head{padding:12px 16px;border-bottom:1px solid var(--g100);display:flex;justify-content:space-between;align-items:center}
.panel-title{font-size:13.5px;font-weight:700;color:var(--g900)}
.panel-more{background:none;border:none;color:var(--blue);font-weight:700;cursor:pointer;font-size:12px;font-family:inherit}
.rt-row{padding:11px 16px;border-bottom:1px solid var(--g100);display:flex;align-items:center;gap:12px}
.rt-row:last-child{border-bottom:none}
.rt-info{flex:1;min-width:0}
.rt-title{font-size:13px;font-weight:600;color:var(--g900);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;margin-bottom:3px}
.rt-sub{display:flex;flex-wrap:wrap;gap:5px;align-items:center}
.rt-prog{width:68px;flex-shrink:0}
.rt-pct{font-size:10px;color:var(--g400);text-align:right;margin-bottom:3px}
/* BADGES */
.badge{display:inline-flex;align-items:center;gap:4px;padding:2px 9px;border-radius:99px;font-size:11px;font-weight:600;white-space:nowrap}
.bdot{width:5px;height:5px;border-radius:50%;flex-shrink:0}
.tag{font-size:10px;padding:1px 7px;border-radius:99px;font-weight:600;white-space:nowrap}
/* PROGRESS */
.pw{background:var(--g100);border-radius:99px;overflow:hidden}
.pb{border-radius:99px;transition:width .45s cubic-bezier(.4,0,.2,1)}
/* DATE RANGE */
.dr-row{display:flex;align-items:center;gap:7px;flex-wrap:wrap;margin-bottom:16px}
.dr-box{display:flex;align-items:center;gap:6px;background:var(--w);border:1.5px solid var(--g200);border-radius:var(--r-sm);padding:5px 10px}
.dr-box input[type=date]{border:none;outline:none;font-size:12px;color:var(--g700);font-family:inherit;background:transparent}
.preset{padding:5px 11px;border-radius:7px;border:1.5px solid var(--g200);background:var(--w);color:var(--g500);font-size:11px;font-weight:600;cursor:pointer;font-family:inherit;transition:all .12s}
.preset:hover,.preset.on{border-color:var(--blue);background:var(--blue-lt);color:var(--blue)}
/* TASK CARDS */
.task-list{display:flex;flex-direction:column;gap:10px}
.tc{background:var(--w);border-radius:var(--r);border:1px solid var(--g100);padding:14px 16px;box-shadow:var(--sh-sm);transition:box-shadow .15s,transform .15s}
.tc:hover{box-shadow:var(--sh-md);transform:translateY(-1px)}
.tc.done{opacity:.72}
.tc.done .tc-title{text-decoration:line-through;color:var(--g400)}
.tc-head{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;margin-bottom:8px}
.tc-left{display:flex;align-items:flex-start;gap:9px;flex:1;min-width:0}
.tc-title{font-size:13.5px;font-weight:700;color:var(--g900);line-height:1.4}
.tc-done-lbl{font-size:11px;color:var(--green);font-weight:700;margin-top:3px}
.tc-meta{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:8px}
.tc-desc{font-size:12px;color:var(--g500);margin-bottom:8px;line-height:1.6}
.tc-dates{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:8px;margin-bottom:8px}
.di-l{font-size:10px;color:var(--g400)}
.di-v{font-size:12px;font-weight:600;color:var(--g700)}
.di-v.over{color:var(--red)}
.tc-depts{margin-bottom:8px;font-size:11px;color:var(--g400)}
.tc-actions{display:flex;gap:5px;flex-shrink:0}
/* QUICK CHECK */
.qc{width:22px;height:22px;border-radius:6px;border:2px solid var(--g300);background:var(--w);cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px;transition:all .15s}
.qc:hover{border-color:var(--green);background:var(--green-lt)}
.qc.done{background:var(--green);border-color:var(--green)}
.today-badge{display:inline-flex;align-items:center;gap:4px;padding:2px 9px;border-radius:99px;font-size:11px;font-weight:700;background:linear-gradient(135deg,var(--green),#22c55e);color:#fff}
/* ICON BTNS */
.ib{padding:6px 8px;border-radius:7px;border:none;cursor:pointer;display:flex;align-items:center;gap:4px;font-size:12px;font-weight:600;font-family:inherit;transition:all .12s;text-decoration:none;flex-shrink:0}
.ib.bl{background:var(--blue-lt);color:var(--blue)}
.ib.rd{background:var(--red-lt);color:var(--red)}
.ib.bl:hover{background:#dceeff}
.ib.rd:hover{background:#fecaca}
/* FILTERS */
.filter-row{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:14px}
.fsel{padding:7px 10px;border:1.5px solid var(--g200);border-radius:var(--r-sm);font-size:12px;color:var(--g700);font-family:inherit;outline:none;background:var(--w)}
.fsel:focus{border-color:var(--blue)}
.vt-wrap{display:flex;background:var(--g100);border-radius:var(--r-sm);padding:3px;gap:2px;margin-left:auto}
.vt-btn{padding:5px 12px;border-radius:6px;border:none;cursor:pointer;font-size:11px;font-weight:700;font-family:inherit;display:flex;align-items:center;gap:5px;transition:all .12s}
.vt-btn.on{background:var(--w);color:var(--blue);box-shadow:var(--sh-sm)}
.vt-btn:not(.on){background:transparent;color:var(--g500)}
/* DATE FILTER BAR */
.dbar{display:flex;align-items:center;gap:8px;flex-wrap:wrap;background:linear-gradient(135deg,var(--blue-lt),rgba(75,174,232,.08));border:1.5px solid rgba(26,95,168,.1);border-radius:var(--r-sm);padding:10px 14px;margin-bottom:14px}
.dbar-lbl{font-size:12px;font-weight:800;color:var(--blue);white-space:nowrap}
.dbar input[type=date]{padding:6px 10px;border:1.5px solid var(--g200);border-radius:7px;font-size:12px;color:var(--g700);font-family:inherit;outline:none;background:var(--w)}
.dbar input[type=date]:focus{border-color:var(--blue)}
.dbar-p{padding:5px 11px;border-radius:7px;border:1.5px solid var(--g200);background:var(--w);color:var(--g500);font-size:11px;font-weight:600;cursor:pointer;font-family:inherit;transition:all .12s}
.dbar-p:hover,.dbar-p.on{border-color:var(--blue);background:var(--blue-lt);color:var(--blue)}
/* WEEK BOARD */
.wb{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:12px}
.wc{background:var(--w);border-radius:var(--r);border:1px solid var(--g100);overflow:hidden;box-shadow:var(--sh-sm)}
.wc-head{padding:10px 14px;background:linear-gradient(135deg,var(--blue-lt),rgba(75,174,232,.06));border-bottom:1px solid var(--g100)}
.wc-lbl{font-size:11.5px;font-weight:800;color:var(--blue)}
.wc-cnt{font-size:11px;color:var(--g500);margin-top:2px}
.wt{padding:10px 14px;border-bottom:1px solid var(--g100);cursor:pointer;transition:background .12s}
.wt:hover{background:var(--g50)}
.wt-title{font-size:12.5px;font-weight:600;color:var(--g900);margin-bottom:5px;line-height:1.4}
/* TIMELINE */
.tl-group{margin-bottom:24px}
.tl-head{display:flex;align-items:center;gap:10px;margin-bottom:12px}
.tl-label{padding:4px 14px;background:linear-gradient(135deg,var(--blue),var(--sky));border-radius:99px;font-size:11.5px;font-weight:700;color:#fff}
.tl-line{flex:1;height:1px;background:var(--g100)}
.tl-cnt{font-size:11px;color:var(--g400)}
.tl-cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(268px,1fr));gap:10px}
.tl-card{background:var(--w);border-radius:10px;border:1px solid var(--g100);padding:13px 14px;border-left-width:3px;box-shadow:var(--sh-sm)}
/* COLLAB */
.cg{display:grid;grid-template-columns:repeat(auto-fill,minmax(238px,1fr));gap:12px}
.cc{background:var(--w);border-radius:var(--r);border:1px solid var(--g100);overflow:hidden;box-shadow:var(--sh-sm)}
.cc-head{padding:11px 13px;background:linear-gradient(135deg,rgba(232,119,34,.07),rgba(232,119,34,.03));border-bottom:1px solid var(--g100);display:flex;justify-content:space-between;align-items:center}
.cc-name{display:flex;align-items:center;gap:7px;font-size:13px;font-weight:700;color:var(--orange)}
.cc-cnt{font-size:10px;background:var(--orange);color:#fff;padding:1px 7px;border-radius:99px;font-weight:800}
.cc-row{padding:9px 13px;border-bottom:1px solid var(--g100)}
.cc-name2{font-size:12px;font-weight:600;color:var(--g900);margin-bottom:4px}
/* PLATFORMS */
.pg{display:grid;grid-template-columns:repeat(auto-fill,minmax(218px,1fr));gap:12px}
.pc{background:var(--w);border-radius:var(--r);border:1px solid var(--g100);padding:14px 14px 12px;box-shadow:var(--sh-sm)}
/* CALENDAR */
.cal-layout{display:grid;grid-template-columns:1fr 320px;gap:16px;height:calc(100vh - 130px);min-height:500px}
.cal-wrap{background:var(--w);border-radius:var(--r);border:1px solid var(--g100);padding:20px;display:flex;flex-direction:column;overflow:hidden;box-shadow:var(--sh-sm)}
.cal-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.cal-nav-btn{padding:7px 14px;border-radius:var(--r-sm);border:1.5px solid var(--g200);background:var(--w);cursor:pointer;font-size:14px;font-weight:700;color:var(--g700);font-family:inherit;transition:all .12s}
.cal-nav-btn:hover{border-color:var(--blue);color:var(--blue)}
.cal-title{font-size:17px;font-weight:800;color:var(--g900)}
.cal-today{margin-left:10px;padding:4px 10px;border-radius:99px;border:1.5px solid var(--g200);background:var(--w);cursor:pointer;font-size:11px;font-weight:700;color:var(--g500);font-family:inherit;transition:all .12s}
.cal-today:hover{border-color:var(--blue);color:var(--blue)}
.cal-dnames{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;margin-bottom:6px}
.cal-dn{text-align:center;font-size:11px;font-weight:700;color:var(--g400);padding:4px 0}
.cal-cells{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;flex:1}
.cal-cell{padding:6px 4px;border-radius:var(--r-sm);cursor:pointer;transition:background .12s;border:1px solid transparent}
.cal-cell.other{opacity:.3;pointer-events:none}
.cal-cell.today{background:var(--blue-lt);border-color:var(--blue)}
.cal-cell.sel{background:var(--blue);border-color:var(--blue)}
.cal-cell:not(.sel):not(.today):hover{background:var(--g100)}
.cal-num{text-align:center;font-size:12px;font-weight:500;color:var(--g900)}
.cal-cell.sel .cal-num{color:#fff;font-weight:800}
.cal-cell.today .cal-num{color:var(--blue);font-weight:800}
.cal-dots{display:flex;gap:2px;justify-content:center;margin-top:2px}
.cal-dot{width:5px;height:5px;border-radius:50%;flex-shrink:0}
.cal-cnt-sm{text-align:center;font-size:9px;font-weight:700;color:var(--g400);margin-top:1px}
.cal-leg{display:flex;gap:14px;margin-top:12px;padding-top:12px;border-top:1px solid var(--g100);flex-wrap:wrap}
.cal-leg-item{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--g500)}
.todo-panel{background:var(--w);border-radius:var(--r);border:1px solid var(--g100);display:flex;flex-direction:column;overflow:hidden;box-shadow:var(--sh-sm)}
.todo-head{padding:14px 16px 10px;border-bottom:1px solid var(--g100);flex-shrink:0}
.todo-date{font-size:15px;font-weight:800;color:var(--g900)}
.todo-cnt{font-size:12px;color:var(--g500);margin-top:2px}
.todo-list{flex:1;overflow-y:auto;padding:10px}
.todo-item{padding:11px 12px 9px;border-radius:var(--r-sm);border:1px solid var(--g100);margin-bottom:7px;transition:box-shadow .12s;background:var(--w)}
.todo-item:hover{box-shadow:var(--sh)}
.todo-title{font-size:13px;font-weight:700;color:var(--g900);margin-bottom:5px;line-height:1.4}
.todo-title.done{text-decoration:line-through;color:var(--g400)}
.todo-foot{padding:10px 16px;border-top:1px solid var(--g100);display:flex;gap:12px;flex-wrap:wrap;flex-shrink:0}
.todo-stat{text-align:center;flex:1;min-width:50px}
.todo-sv{font-size:18px;font-weight:900}
.todo-sl{font-size:10px;color:var(--g400)}
/* REPORTS */
.rep-layout{display:grid;grid-template-columns:262px 1fr;gap:16px;height:calc(100vh - 130px);min-height:400px}
.rep-list{background:var(--w);border-radius:var(--r);border:1px solid var(--g100);display:flex;flex-direction:column;overflow:hidden;box-shadow:var(--sh-sm)}
.rep-list-head{padding:11px 13px;border-bottom:1px solid var(--g100);display:flex;justify-content:space-between;align-items:center}

<script>

// ══════════════════════════════════════════════════
//  AUTH  (SHA-256, no plain-text storage)
// ══════════════════════════════════════════════════
const AUTH_KEY      = 'lc_auth_hash';    // localStorage: stored password hash
const SESSION_KEY   = 'lc_session';      // sessionStorage: logged-in flag for this tab
const DEFAULT_PW    = 'longchau2026';    // first-run default (user should change this)

async function sha256(str){
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
}

function getStoredHash(){
  // Hash stored in localStorage; if none, use sha256 of default (bootstrapped on first login)
  return localStorage.getItem(AUTH_KEY) || null;
}

async function tryLogin(){
  const pw = document.getElementById('auth-pw').value;
  if(!pw){ showAuthErr('Vui lòng nhập mật khẩu'); return; }

  const btn = document.getElementById('auth-submit-btn');
  if(btn){ btn.disabled = true; btn.textContent = 'Đang kiểm tra...'; }

  const inputHash = await sha256(pw);
  let storedHash  = getStoredHash();

  // First ever login: no hash stored yet → bootstrap with default password
  if(!storedHash){
    const defaultHash = await sha256(DEFAULT_PW);
    if(inputHash === defaultHash){
      localStorage.setItem(AUTH_KEY, defaultHash);
      storedHash = defaultHash;
    }
  }

  if(inputHash === storedHash){
    sessionStorage.setItem(SESSION_KEY, 'admin');
    hideAuthOverlay('admin');
  } else {
    showAuthErr('Mật khẩu không đúng');
    document.getElementById('auth-pw').classList.add('error');
    document.getElementById('auth-pw').value = '';
    btn.disabled = false; btn.textContent = 'Đăng nhập Admin';
  }
}

// ── Loading overlay helpers ──
function showLoading(msg='Đang tải dữ liệu mới nhất...', sub='Vui lòng chờ trong giây lát'){
  const el = document.getElementById('loading-overlay');
  el.style.display = 'flex';
  document.getElementById('loading-msg').textContent = msg;
  document.getElementById('loading-sub').textContent = sub;
  document.getElementById('loading-bar').style.width = '0%';
  // Animate bar to 80% while waiting
  setTimeout(()=>{ document.getElementById('loading-bar').style.width='80%'; }, 100);
}
function hideLoading(){
  const bar = document.getElementById('loading-bar');
  bar.style.width = '100%';
  setTimeout(()=>{
    document.getElementById('loading-overlay').style.display = 'none';
    bar.style.width = '0%';
  }, 300);
}

function enterViewMode(){
  sessionStorage.setItem(SESSION_KEY, 'view');
  if(currentTab==='settings') currentTab='dashboard';
  document.getElementById('auth-overlay').style.display = 'none';
  // Vào view mode NGAY — không block dù Drive lỗi
  setMode('view');
  // Sau đó thử load Drive ngầm (không block UI)

// Change password (called from Settings)
async function changePassword(oldPw, newPw, confirmPw){
  if(!oldPw||!newPw||!confirmPw){ return {ok:false, msg:'Vui lòng điền đủ các trường'}; }
  if(newPw !== confirmPw)         { return {ok:false, msg:'Mật khẩu mới không khớp'}; }
  if(newPw.length < 6)            { return {ok:false, msg:'Mật khẩu mới tối thiểu 6 ký tự'}; }

  const oldHash = await sha256(oldPw);
  const stored  = getStoredHash() || await sha256(DEFAULT_PW);
  if(oldHash !== stored)          { return {ok:false, msg:'Mật khẩu hiện tại không đúng'}; }

  const newHash = await sha256(newPw);
  localStorage.setItem(AUTH_KEY, newHash);
  return {ok:true, msg:'Đổi mật khẩu thành công!'};
}

async function submitChangePw(){
  const old  = document.getElementById('cpw-old')?.value  || '';
  const nw   = document.getElementById('cpw-new')?.value  || '';
  const conf = document.getElementById('cpw-conf')?.value || '';
  const res  = await changePassword(old, nw, conf);
  const msgEl = document.getElementById('cpw-msg');
  if(msgEl){
    msgEl.textContent = res.msg;
    msgEl.style.color = res.ok ? 'var(--green)' : 'var(--red)';
  }
  if(res.ok){
    setTimeout(()=>{ document.getElementById('cpw-old').value=''; document.getElementById('cpw-new').value=''; document.getElementById('cpw-conf').value=''; if(msgEl) msgEl.textContent=''; }, 3000);
  }
}

// PUSH lên Drive — dùng no-cors (không đọc response, chỉ ghi)
async function driveSync(){
  const url = cfg().driveScriptUrl;
  if(!url){ goTab('settings'); settingsTab='drive'; renderAll(); alert('Vui lòng cấu hình Apps Script URL trong Cài đặt → Google Drive.'); return; }
  setSaveInd('syncing','Đang lưu lên Drive...');
  try {
    await fetch(url, {
      method:'POST',
      mode:'no-cors',                    // gửi được, không cần đọc response
      headers:{'Content-Type':'text/plain'},
      body: JSON.stringify(db),
    });
    setSaveInd('ok','Đã lưu Drive ✓');
    setTimeout(()=>setSaveInd('','localStorage'), 3000);
  } catch(e) {
    setSaveInd('err','Lỗi gửi Drive');
    setTimeout(()=>setSaveInd('','localStorage'), 4000);
  }
}

// PULL từ Drive — dùng JSONP để bypass CORS hoàn toàn
function driveLoadJSONP(url){
  return new Promise((resolve, reject)=>{
    try {
      const cbName = '_driveCallback_' + Date.now();
      const timeout = setTimeout(()=>{
        delete window[cbName];
        if(document.head.contains(script)) document.head.removeChild(script);
        reject(new Error('Timeout'));
      }, 8000);

      window[cbName] = (data)=>{
        clearTimeout(timeout);
        delete window[cbName];
        if(document.head.contains(script)) document.head.removeChild(script);
        resolve(data);
      };

      const script = document.createElement('script');
      script.src = url + '?callback=' + cbName + '&action=get&t=' + Date.now();
      script.onerror = ()=>{
        clearTimeout(timeout);
        delete window[cbName];
        reject(new Error('Script error'));
      };
      document.head.appendChild(script);
    } catch(e) {
      reject(e);
    }
  });
}

async function driveLoad(silent=false){
  const url = cfg().driveScriptUrl;
  if(!url) return false;
  try {
    let data = null;
    // Thử JSONP trước
    try { data = await driveLoadJSONP(url); } catch(e1) {
      // Fallback: fetch cors
      try {
        const res = await fetch(url + '?action=get&t=' + Date.now(), { mode:'cors' });
        data = await res.json();
      } catch(e2) { return false; }
    }
    if(data && data.tasks){ db=data; saveDB(); applyColors(); return true; }
    return false;
  } catch(e) {
    return false;
  }
}

function uid(){ return 'i'+Date.now()+Math.random().toString(36).slice(2,6); }
function fmtD(s){ if(!s) return '-'; const d=new Date(s+'T00:00:00'); return `${String(d.getDate()).padStart(2,'0')}/${String(d.getMonth()+1).padStart(2,'0')}/${d.getFullYear()}`; }
function weekNum(d){ const j=new Date(d.getFullYear(),0,1); return Math.ceil(((d-j)/86400000+j.getDay()+1)/7); }
function weekLabel(s){ if(!s) return 'Chưa xác định'; const d=new Date(s+'T00:00:00'); const mon=new Date(d); mon.setDate(d.getDate()-d.getDay()+1); const sun=new Date(mon); sun.setDate(mon.getDate()+6); return `W${weekNum(d)}: ${fmtD(mon.toISOString().slice(0,10))} - ${fmtD(sun.toISOString().slice(0,10))}`; }
function svgI(d,s=16,c='currentColor'){ return `<svg width="${s}" height="${s}" viewBox="0 0 24 24" fill="none" stroke="${c}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="${d}"/></svg>`; }
function bdg(label,cfg){ return `<span class="badge" style="background:${cfg.bg};color:${cfg.text}"><span class="badge-dot" style="background:${cfg.dot}"></span>${label}</span>`; }
function pb(v,color,h=8){ return `<div class="prog-wrap" style="height:${h}px"><div class="prog-bar" style="width:${Math.min(v,100)}%;height:${h}px;background:${color}"></div></div>`; }
function inRange(t){ const[s,e]=dateRange; if(!s&&!e) return true; const ref=t.dueDate||t.startDate; if(!ref) return true; if(s&&ref<s) return false; if(e&&ref>e) return false; return true; }

// Lọc theo ngày xem: task đang active tại ngày đó (startDate ≤ ngày ≤ dueDate)
function inDateView(t){
  if(!filterDate) return true;
  const s = t.startDate || '';
  const e = t.dueDate   || '';
  // Nếu không có ngày nào → hiện khi không lọc
  if(!s && !e) return false;
  // startDate ≤ filterDate (task đã bắt đầu tại hoặc trước ngày xem)
  const startOk = !s || s <= filterDate;
  // dueDate >= filterDate (task chưa kết thúc tại ngày xem)
  const endOk   = !e || e >= filterDate;
  return startOk && endOk;
}

function filtered(useDateView=false){
  return db.tasks.filter(t=>{
    if(filterStatus!=='Tất cả'&&t.status!==filterStatus) return false;
    if(filterPlat!=='Tất cả'&&!t.platform.includes(filterPlat)) return false;
    if(useDateView) return inDateView(t);
    return inRange(t);
  });
}
function stats(){ const ft=filtered(); return { total:ft.length, done:ft.filter(t=>t.status==='Hoàn thành').length, inProg:ft.filter(t=>t.status==='Đang thực hiện').length, overdue:ft.filter(t=>t.dueDate&&t.dueDate<TODAY&&t.status!=='Hoàn thành').length, avgProg:ft.length?Math.round(ft.reduce((a,t)=>a+t.progress,0)/ft.length):0 }; }

function taskCard(t,adm){

        <button class="icon-btn edit" onclick="openEditTask('${t.id}')">${svgI('M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z',14)}</button>
        <button class="icon-btn del" onclick="deleteTask('${t.id}')">${svgI('M3 6h18M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6M10 11v6M14 11v6M9 6V4a1 1 0 011-1h4a1 1 0 011 1v2',14)}</button>
      </div>`:''}

      <span class="tag" style="background:var(--g100);color:var(--g500)">${t.category}</span>
      ${t.platform.map(p=>`<span class="tag" style="background:var(--blue-lt);color:var(--blue)">${p}</span>`).join('')}
      ${t.dueDate?`<span class="tag" style="background:var(--g100);color:var(--g500)">W${weekNum(new Date(t.dueDate+'T00:00:00'))}</span>`:''}
    </div>

      <div><div class="di-label">Bắt đầu</div><div class="di-val">${fmtD(t.startDate)}</div></div>

function renderWeekBoard(tasks,adm){
  const map={};
  tasks.forEach(t=>{ const k=weekLabel(t.dueDate||t.startDate||''),n=t.dueDate?weekNum(new Date(t.dueDate+'T00:00:00')):999; if(!map[k]) map[k]={n,tasks:[]}; map[k].tasks.push(t); });
  const weeks=Object.entries(map).sort((a,b)=>a[1].n-b[1].n);
  if(!weeks.length) return '<div class="empty">Không có công việc nào</div>';
  return `<div class="week-board">${weeks.map(([label,{tasks:wt}])=>`
    <div class="week-col">
      <div class="week-col-head"><div class="wh-label">${label}</div><div class="wh-count">${wt.length} công việc</div></div>
      ${wt.map(t=>`
        <div class="week-task" onclick="${adm?`openEditTask('${t.id}')`:''}" style="${adm?'':'cursor:default'}">
          <div class="wt-title">${t.title}</div>
          <div class="wt-foot">${bdg(t.status,STATUS_CFG[t.status]||STATUS_CFG['Chưa bắt đầu'])}<span style="font-size:11px;font-weight:700;color:${t.progress===100?'var(--green)':'var(--blue)'}">${t.progress}%</span></div>
          ${pb(t.progress,t.progress===100?'var(--green)':'var(--blue)',5)}
          ${t.departments.length?`<div style="margin-top:5px;display:flex;flex-wrap:wrap;gap:3px">${t.departments.map(d=>`<span class="tag" style="background:var(--orange-lt);color:var(--orange)">${d}</span>`).join('')}</div>`:''}
        </div>`).join('')}
    </div>`).join('')}</div>`;
}

function renderTimeline(){
  const ft=filtered().sort((a,b)=>(a.dueDate||'').localeCompare(b.dueDate||''));
  const grp={};
  ft.forEach(t=>{ const k=t.dueDate?weekLabel(t.dueDate):'Chưa xác định'; if(!grp[k]) grp[k]=[]; grp[k].push(t); });
  if(!Object.keys(grp).length) return drRow()+'<div class="empty">Không có công việc nào</div>';
  return drRow()+Object.entries(grp).map(([week,tasks])=>`
    <div class="tl-week-group">
      <div class="tl-week-head"><div class="tl-week-label">${week}</div><div class="tl-divider"></div><span class="tl-count">${tasks.length} task</span></div>
      <div class="tl-cards">${tasks.map(t=>{
        const sc=STATUS_CFG[t.status]||STATUS_CFG['Chưa bắt đầu'];
        const ov=t.dueDate&&t.dueDate<TODAY&&t.status!=='Hoàn thành';
        return `<div class="tl-card" style="border-left-color:${sc.dot}">
          <div style="font-size:13px;font-weight:700;color:var(--g900);margin-bottom:6px">${t.title}</div>
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">${bdg(t.status,sc)}<span style="font-size:11px;color:var(--g400)">${fmtD(t.startDate)} → <span style="${ov?'color:var(--red);font-weight:700':''}">${fmtD(t.dueDate)}</span></span></div>
          ${pb(t.progress,t.status==='Hoàn thành'?'var(--green)':'var(--blue)')}
          ${t.expectedResult?`<div style="margin-top:7px;font-size:11px;color:var(--g500)">🎯 ${t.expectedResult}</div>`:''}
          ${t.departments.length?`<div style="margin-top:5px">${t.departments.map(d=>`<span class="tag" style="background:var(--orange-lt);color:var(--orange);margin-right:3px">${d}</span>`).join('')}</div>`:''}
        </div>`;
      }).join('')}</div>
    </div>`).join('');
}

function renderPlatforms(){
  const ft=filtered();
  return drRow()+`<div class="plat-grid">${PLATS().filter(p=>ft.some(t=>t.platform.includes(p))).map(plat=>{
    const tasks=ft.filter(t=>t.platform.includes(plat));
    const done=tasks.filter(t=>t.status==='Hoàn thành').length;
    const pct=tasks.length?Math.round(done/tasks.length*100):0;
    return `<div class="plat-card">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
        <div style="display:flex;align-items:center;gap:7px"><div style="padding:7px;background:var(--blue-lt);border-radius:7px">${svgI('M2 3h20v14a2 2 0 01-2 2H4a2 2 0 01-2-2V3zM8 21h8M12 17v4',14,'var(--blue)')}</div><span style="font-size:13px;font-weight:700;color:var(--g900)">${plat}</span></div>
        <span style="font-size:14px;font-weight:800;color:var(--blue)">${tasks.length}</span>
      </div>
      ${pb(pct,'var(--orange)')}
      <div style="font-size:11px;color:var(--g400);margin:5px 0 10px">${done}/${tasks.length} hoàn thành (${pct}%)</div>
      ${tasks.slice(0,3).map(t=>`<div style="font-size:11.5px;padding:5px 0;border-top:1px solid var(--g100);display:flex;justify-content:space-between;gap:6px;align-items:center"><span style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1;color:var(--g700)">${t.title}</span>${bdg(t.status,STATUS_CFG[t.status]||STATUS_CFG['Chưa bắt đầu'])}</div>`).join('')}
    </div>`;
  }).join('')}</div>`;
}

  const embedUrl=url=>{ if(!url) return null; if(url.includes('docs.google.com/presentation')) return url.replace(/\/edit.*$/,'/embed?start=false&loop=false&delayms=3000'); return url; };
  return `<div class="reports-layout">
    <div class="report-list">
      <div class="report-list-head"><span>Báo cáo</span>${adm?`<button class="icon-btn edit" style="padding:5px 10px;font-size:11px;font-weight:700;gap:4px" onclick="openAddReport()">${svgI('M12 5v14M5 12h14',13)} Thêm</button>`:''}</div>

      ${selR?`
        <h3 style="font-size:17px;font-weight:800;color:var(--g900);margin-bottom:4px">${selR.title}</h3>
        <div style="font-size:12px;color:var(--g500);margin-bottom:16px">Kỳ: <strong>${selR.period}</strong> · Tạo: ${fmtD(selR.createdAt)}${selR.summary?' · '+selR.summary:''}</div>

// Settings mutations
function setSetting(key, val){
  if(!db.settings) db.settings=JSON.parse(JSON.stringify(DEFAULT_SETTINGS));
  db.settings[key]=val;
  saveDB(); renderNav();
}
function setColor(key, val){
  if(!db.settings) db.settings=JSON.parse(JSON.stringify(DEFAULT_SETTINGS));
  if(!db.settings.colors) db.settings.colors={};
  db.settings.colors[key]=val;
  saveDB(); applyColors();
  // update preview box inline without full re-render
  const boxes=document.querySelectorAll('.color-row');
  boxes.forEach(row=>{
    const inputs=row.querySelectorAll('input');
    const preview=row.querySelector('div');
    if(inputs.length>=2&&preview){ preview.style.background=inputs[0].value; }
  });
}
function resetColors(){
  if(!db.settings) db.settings=JSON.parse(JSON.stringify(DEFAULT_SETTINGS));
  db.settings.colors=JSON.parse(JSON.stringify(DEFAULT_SETTINGS.colors));
  saveDB(); applyColors(); renderAll();
}
function updateListItem(listKey, idx, val){
  if(!db.settings) db.settings=JSON.parse(JSON.stringify(DEFAULT_SETTINGS));
  if(!db.settings[listKey]) db.settings[listKey]=[...DEFAULT_SETTINGS[listKey]];
  db.settings[listKey][idx]=val;
  saveDB();
}
function deleteListItem(listKey, idx){
  if(!db.settings) db.settings=JSON.parse(JSON.stringify(DEFAULT_SETTINGS));
  if(!db.settings[listKey]) db.settings[listKey]=[...DEFAULT_SETTINGS[listKey]];
  db.settings[listKey].splice(idx,1);
  saveDB(); renderAll();
}
function addListItem(listKey){
  if(!db.settings) db.settings=JSON.parse(JSON.stringify(DEFAULT_SETTINGS));
  if(!db.settings[listKey]) db.settings[listKey]=[...DEFAULT_SETTINGS[listKey]];
  db.settings[listKey].push('');
  saveDB(); renderAll();
  // focus last input

// ══════════════════════════════════════════════════
//  CALENDAR VIEW
// ══════════════════════════════════════════════════
let calendarYear  = new Date().getFullYear();
let calendarMonth = new Date().getMonth(); // 0-indexed
let calendarSelectedDay = null;

function renderCalendar(){
  const year  = calendarYear;
  const month = calendarMonth;
  const monthNames = ['Tháng 1','Tháng 2','Tháng 3','Tháng 4','Tháng 5','Tháng 6','Tháng 7','Tháng 8','Tháng 9','Tháng 10','Tháng 11','Tháng 12'];
  const dayNames   = ['T2','T3','T4','T5','T6','T7','CN'];

  // Build calendar grid
  const firstDay = new Date(year, month, 1).getDay(); // 0=Sun
  const daysInMonth = new Date(year, month+1, 0).getDate();
  const daysInPrev  = new Date(year, month, 0).getDate();
  // Convert Sunday=0 to Mon-first grid
  const startOffset = (firstDay === 0 ? 6 : firstDay - 1);

  // All tasks with dates relevant to this month
  const monthStart = `${year}-${String(month+1).padStart(2,'0')}-01`;
  const monthEnd   = `${year}-${String(month+1).padStart(2,'0')}-${String(daysInMonth).padStart(2,'0')}`;

  function tasksOnDay(dateStr){
    return db.tasks.filter(t=>{
      const s = t.startDate || '';
      const e = t.dueDate   || '';
      if(!s && !e) return false;
      const startOk = !s || s <= dateStr;
      const endOk   = !e || e >= dateStr;
      return startOk && endOk;
    });
  }

  function tasksDueOnDay(dateStr){
    return db.tasks.filter(t => t.dueDate === dateStr);
  }

  function tasksStartOnDay(dateStr){
    return db.tasks.filter(t => t.startDate === dateStr);
  }

  // Build cells
  let cells = [];
  // Prev month padding
  for(let i = startOffset - 1; i >= 0; i--){
    cells.push({ day: daysInPrev - i, cur: false, dateStr: null });
  }
  // Current month
  for(let d = 1; d <= daysInMonth; d++){
    const dateStr = `${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    cells.push({ day: d, cur: true, dateStr });
  }
  // Next month padding to fill 6 rows
  let next = 1;
  while(cells.length < 42){ cells.push({ day: next++, cur: false, dateStr: null }); }

  // Selected day — default to today if in current month, else 1st
  if(!calendarSelectedDay || !calendarSelectedDay.startsWith(monthStart.slice(0,7))){
    if(TODAY.startsWith(monthStart.slice(0,7))){
      calendarSelectedDay = TODAY;
    } else {
      calendarSelectedDay = monthStart;
    }
  }

  const selTasks = tasksOnDay(calendarSelectedDay);
  const selD     = parseInt(calendarSelectedDay.slice(8));
  const isAdmin  = currentMode === 'admin';

  // Color dot logic per day
  function dotHTML(dateStr){
    if(!dateStr) return '';
    const due   = tasksDueOnDay(dateStr);
    const start = tasksStartOnDay(dateStr);
    const active= tasksOnDay(dateStr);
    if(!active.length) return '';
    const hasDue   = due.length > 0;
    const hasStart = start.length > 0;
    const hasOver  = due.some(t=>t.status!=='Hoàn thành'&&t.dueDate<TODAY);
    if(hasOver)  return `<div style="display:flex;gap:2px;justify-content:center;margin-top:2px"><span style="width:5px;height:5px;border-radius:50%;background:#EF4444;display:inline-block"></span></div>`;
    if(hasDue)   return `<div style="display:flex;gap:2px;justify-content:center;margin-top:2px"><span style="width:5px;height:5px;border-radius:50%;background:var(--orange);display:inline-block"></span></div>`;
    if(hasStart) return `<div style="display:flex;gap:2px;justify-content:center;margin-top:2px"><span style="width:5px;height:5px;border-radius:50%;background:var(--green);display:inline-block"></span></div>`;
    return `<div style="display:flex;gap:2px;justify-content:center;margin-top:2px"><span style="width:5px;height:5px;border-radius:50%;background:var(--blue);display:inline-block"></span></div>`;
  }

  const calHTML = `
    <div style="display:grid;grid-template-columns:1fr 320px;gap:16px;height:calc(100vh - 130px);min-height:500px">

      <!-- LEFT: CALENDAR GRID -->
      <div style="background:var(--w);border-radius:14px;border:1px solid var(--g100);padding:20px;display:flex;flex-direction:column;overflow:hidden">

        <!-- Month nav -->
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px">
          <button onclick="calendarMonth--;if(calendarMonth<0){calendarMonth=11;calendarYear--;}calendarSelectedDay=null;renderAll()"
            style="padding:7px 12px;border-radius:8px;border:1.5px solid var(--g200);background:var(--w);cursor:pointer;font-size:13px;font-weight:700;font-family:'Inter',sans-serif;color:var(--g700)">‹</button>
          <div>
            <span style="font-size:17px;font-weight:800;color:var(--g900)">${monthNames[month]} ${year}</span>
            <button onclick="calendarYear=new Date().getFullYear();calendarMonth=new Date().getMonth();calendarSelectedDay=null;renderAll()"
              style="margin-left:10px;padding:4px 10px;border-radius:99px;border:1.5px solid var(--g200);background:var(--w);cursor:pointer;font-size:11px;font-weight:700;font-family:'Inter',sans-serif;color:var(--g500)">Hôm nay</button>
          </div>
          <button onclick="calendarMonth++;if(calendarMonth>11){calendarMonth=0;calendarYear++;}calendarSelectedDay=null;renderAll()"
            style="padding:7px 12px;border-radius:8px;border:1.5px solid var(--g200);background:var(--w);cursor:pointer;font-size:13px;font-weight:700;font-family:'Inter',sans-serif;color:var(--g700)">›</button>
        </div>

        <!-- Day headers -->
        <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:2px;margin-bottom:6px">
          ${dayNames.map(d=>`<div style="text-align:center;font-size:11px;font-weight:700;color:var(--g400);padding:4px 0">${d}</div>`).join('')}
        </div>

        <!-- Calendar cells -->
        <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:3px;flex:1">
          ${cells.map(cell=>{
            if(!cell.cur) return `<div style="padding:6px 4px;border-radius:8px;opacity:.3"><div style="font-size:12px;font-weight:500;color:var(--g400);text-align:center">${cell.day}</div></div>`;
            const isToday   = cell.dateStr === TODAY;
            const isSel     = cell.dateStr === calendarSelectedDay;
            const active    = tasksOnDay(cell.dateStr);
            const hasDue    = tasksDueOnDay(cell.dateStr).length > 0;
            const hasOver   = tasksDueOnDay(cell.dateStr).some(t=>t.status!=='Hoàn thành'&&t.dueDate<TODAY);
            let bg='transparent', border='1px solid transparent', textColor='var(--g900)', fontW='500';
            if(isSel)    { bg='var(--blue)'; border='1px solid var(--blue)'; textColor='#fff'; fontW='800'; }
            else if(isToday) { bg='var(--blue-lt)'; border='1.5px solid var(--blue)'; textColor='var(--blue)'; fontW='800'; }
            else if(active.length) { bg='var(--g50)'; }
            return `<div onclick="calendarSelectedDay='${cell.dateStr}';renderAll()"
              style="padding:6px 4px;border-radius:8px;cursor:pointer;background:${bg};border:${border};transition:all .15s"
              onmouseover="if('${cell.dateStr}'!=='${calendarSelectedDay}')this.style.background='var(--g100)'"
              onmouseout="this.style.background='${bg}'">
              <div style="font-size:12px;font-weight:${fontW};color:${textColor};text-align:center">${cell.day}</div>
              ${isSel ? '' : dotHTML(cell.dateStr)}
              ${active.length && !isSel ? `<div style="text-align:center;font-size:9px;font-weight:700;color:var(--g400);margin-top:1px">${active.length}</div>`:''}
            </div>`;
          }).join('')}
        </div>

        <!-- Legend -->
        <div style="display:flex;gap:14px;margin-top:14px;padding-top:12px;border-top:1px solid var(--g100);flex-wrap:wrap">
          ${[
            {color:'var(--blue)',  label:'Đang thực hiện'},
            {color:'var(--green)', label:'Ngày bắt đầu'},
            {color:'var(--orange)',label:'Ngày deadline'},
            {color:'#EF4444',      label:'Quá hạn'},
          ].map(l=>`<div style="display:flex;align-items:center;gap:5px;font-size:11px;color:var(--g500);font-weight:500">
            <span style="width:8px;height:8px;border-radius:50%;background:${l.color};flex-shrink:0"></span>${l.label}
          </div>`).join('')}
        </div>
      </div>

      <!-- RIGHT: TODO LIST for selected day -->
      <div style="background:var(--w);border-radius:14px;border:1px solid var(--g100);display:flex;flex-direction:column;overflow:hidden">

        <!-- Header -->
        <div style="padding:16px 18px 12px;border-bottom:1px solid var(--g100)">
          <div style="font-size:15px;font-weight:800;color:var(--g900)">
            ${selD} tháng ${month+1}, ${year}
            ${calendarSelectedDay===TODAY?'<span style="font-size:11px;font-weight:700;color:var(--blue);background:var(--blue-lt);padding:2px 8px;border-radius:99px;margin-left:6px">Hôm nay</span>':''}
          </div>
          <div style="font-size:12px;color:var(--g500);margin-top:3px">${selTasks.length} công việc đang active</div>
        </div>

        <!-- Todo list -->
        <div style="flex:1;overflow-y:auto;padding:12px">
          ${selTasks.length === 0
            ? `<div style="padding:32px 16px;text-align:center;color:var(--g300)">
                <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="margin:0 auto 10px;display:block"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
                <div style="font-size:13px">Không có công việc</div>
              </div>`
            : selTasks.map(t=>{
                const sc = STATUS_CFG[t.status]||STATUS_CFG['Chưa bắt đầu'];
                const isDone = t.status==='Hoàn thành';
                const isStart = t.startDate===calendarSelectedDay;
                const isDue   = t.dueDate===calendarSelectedDay;
                const isOver  = t.dueDate && t.dueDate<TODAY && !isDone;
                const pc2 = isDone?'var(--green)':t.progress>60?'var(--sky)':'var(--orange)';
                return `
                  <div style="padding:12px 12px 10px;border-radius:10px;border:1px solid var(--g100);margin-bottom:8px;

                    onmouseout="this.style.boxShadow='none'">

                        <!-- Date range -->
                        <div style="display:flex;gap:8px;font-size:11px;color:var(--g500);margin-bottom:6px;align-items:center">
                          <span>${svgI('M3 4h18v18H3zM16 2v4M8 2v4M3 10h18',11,'var(--g400)')}  ${fmtD(t.startDate)}</span>
                          <span style="color:var(--g300)">→</span>
                          <span style="color:${isOver?'var(--red)':'inherit'};font-weight:${isOver?'700':'400'}">${fmtD(t.dueDate)}</span>
                        </div>

                        <!-- Progress bar -->
                        <div style="display:flex;align-items:center;gap:8px">
                          <div style="flex:1">${pb(t.progress, pc2, 5)}</div>
                          <span style="font-size:10px;font-weight:700;color:${pc2};width:28px;text-align:right">${t.progress}%</span>
                        </div>

                        ${t.departments.length?`<div style="margin-top:5px;display:flex;flex-wrap:wrap;gap:3px">${t.departments.map(d=>`<span style="font-size:10px;background:var(--orange-lt);color:var(--orange);padding:1px 6px;border-radius:99px;font-weight:600">${d}</span>`).join('')}</div>`:''}
                      </div>
                    </div>
                  </div>`;
              }).join('')}
        </div>

        <!-- Stats footer -->
        ${selTasks.length > 0 ? `
        <div style="padding:12px 16px;border-top:1px solid var(--g100);display:flex;gap:12px;flex-wrap:wrap">
          ${[
            {label:'Hoàn thành', v:selTasks.filter(t=>t.status==='Hoàn thành').length, c:'var(--green)'},
            {label:'Đang làm',   v:selTasks.filter(t=>t.status==='Đang thực hiện').length, c:'var(--blue)'},
            {label:'Deadline',   v:tasksDueOnDay(calendarSelectedDay).length, c:'var(--orange)'},
            {label:'Bắt đầu',    v:tasksStartOnDay(calendarSelectedDay).length, c:'var(--sky)'},
          ].filter(s=>s.v>0).map(s=>`
            <div style="text-align:center;flex:1;min-width:50px">
              <div style="font-size:18px;font-weight:900;color:${s.c}">${s.v}</div>
              <div style="font-size:10px;color:var(--g400);font-weight:500">${s.label}</div>
            </div>`).join('')}
        </div>` : ''}
      </div>
    </div>`;

  return calHTML;
}

// ══════════════════════════════════════════════════
//  RENDER ALL
// ══════════════════════════════════════════════════
const VIEWS={dashboard:renderDashboard,tasks:renderTasks,calendar:renderCalendar,timeline:renderTimeline,collab:renderCollab,platforms:renderPlatforms,reports:renderReports,settings:renderSettings};

function renderAll(){
  renderNav();
  document.getElementById('page-title').textContent=PAGE_TITLES[currentTab]||'';
  const tba=document.getElementById('topbar-action');
  const tbl=document.getElementById('topbar-action-label');
  if(currentMode==='admin'&&currentTab==='tasks'){ tba.style.display='flex'; tbl.textContent='Thêm công việc'; tba.onclick=openAddTask; }
  else { tba.style.display='none'; }
  document.getElementById('content').innerHTML = syncBannerHTML() + (VIEWS[currentTab]||renderDashboard)();
}

// ══════════════════════════════════════════════════
//  INIT
// ══════════════════════════════════════════════════
applyColors();
const _initMode = checkSession();

if(_initMode === 'admin'){
  currentMode = 'admin';
  renderAll();
  autoLoadFromDrive(true).catch(()=>{});

} else if(_initMode === 'view'){
  currentMode = 'view';
  document.body.className = 'view-mode';
  renderAll(); // render ngay bằng localStorage
  // Luôn thử sync Drive dù có hay không (hàm tự kiểm tra URL bên trong)
  autoLoadFromDrive(false).catch(()=>{}).finally(()=>{ renderAll(); });

} else {
  // Chưa có session — hiện auth overlay
  currentMode = 'view';
  document.body.className = 'view-mode';
  renderAll();
}

</script>
</body>
</html>
